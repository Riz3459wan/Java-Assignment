<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Animations & Transitions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <!-- Smooth Scroll Navigation -->
    <header class="nav">
        <a href="#buttons">Buttons</a>
        <a href="#cards">Card Flip</a>
        <a href="#spinner">Loader</a>
    </header>

    <!-- 1️⃣ Button Hover Effects -->
    <section id="buttons">
        <h2>Button Hover Effects</h2>
        <button class="btn">Hover Me</button>
    </section>

    <!-- 2️⃣ Card Flip Animation -->
    <section id="cards">
        <h2>Card Flip Animation</h2>

        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    Front Side
                </div>
                <div class="flip-card-back">
                    Back Side
                </div>
            </div>
        </div>
    </section>

    <!-- 3️⃣ Loading Spinner -->
    <section id="spinner">
        <h2>Loading Spinner</h2>
        <div class="loader"></div>
    </section>

</body>
</html>
